name: Publish to GitHub Packages

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Configure Maven for GitHub Packages
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>github</id>
                <username>${{ github.actor }}</username>
                <password>${{ secrets.GITHUB_TOKEN }}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Run tests (verify)
        run: >-
          mvn --batch-mode -ntp verify
          -Dgithub.repository=${{ github.repository }}
          -Drevision=${{ github.sha }}

      - name: Deploy immutable version (${{ github.sha }})
        run: >-
          mvn --batch-mode -ntp deploy
          -Dgithub.repository=${{ github.repository }}
          -Drevision=${{ github.sha }}

      - name: Remove previous GitHub Packages version 'latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO_FULL="${{ github.repository }}"
          if gh api "orgs/${OWNER}" --silent 2>/dev/null; then
            BASE="orgs/${OWNER}"
          else
            BASE="users/${OWNER}"
          fi

          # Resolve real package name (404/error JSON must never be parsed as a version id)
          PKG=$(gh api --paginate "${BASE}/packages?package_type=maven" \
            -q ".[] | select(.repository != null and .repository.full_name == \"${REPO_FULL}\") | .name" 2>/dev/null | head -1 || true)
          if [ -z "$PKG" ]; then
            for cand in "com.mshrai.larer" "larer"; do
              if OUT=$(gh api "${BASE}/packages/maven/${cand}/versions" 2>/dev/null) && echo "$OUT" | jq -e 'type == "array"' >/dev/null 2>&1; then
                PKG="$cand"
                break
              fi
            done
          fi
          if [ -z "$PKG" ]; then
            echo "Could not resolve Maven package for ${REPO_FULL}; skipping delete of latest"
            exit 0
          fi
          echo "Maven package for API: ${PKG}"

          if ! RAW=$(gh api "${BASE}/packages/maven/${PKG}/versions"); then
            echo "Failed to list versions for ${PKG}; skipping delete"
            exit 0
          fi
          if ! echo "$RAW" | jq -e 'type == "array"' >/dev/null 2>&1; then
            echo "Versions response is not a list; skipping delete"
            exit 0
          fi
          VID=$(echo "$RAW" | jq -r '.[] | select(.name == "latest") | .id' | head -n1)
          if ! [[ "${VID}" =~ ^[0-9]+$ ]]; then
            echo "No existing numeric 'latest' version (first run or already absent); skipping delete"
            exit 0
          fi
          echo "Deleting ${PKG} version latest (id=${VID})"
          gh api --method DELETE "${BASE}/packages/maven/${PKG}/versions/${VID}"

      - name: Deploy moving tag 'latest'
        run: >-
          mvn --batch-mode -ntp deploy
          -Dgithub.repository=${{ github.repository }}
          -Drevision=latest
