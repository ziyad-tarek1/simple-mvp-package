name: Publish to GitHub Packages

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Configure Maven for GitHub Packages
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>github</id>
                <username>${{ github.actor }}</username>
                <password>${{ secrets.GITHUB_TOKEN }}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Deploy immutable version (${{ github.sha }})
        run: >-
          mvn --batch-mode -ntp deploy
          -Dgithub.repository=${{ github.repository }}
          -Drevision=${{ github.sha }}

      - name: Remove previous GitHub Packages version 'latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER="${{ github.repository_owner }}"
          if gh api "orgs/${OWNER}" --silent 2>/dev/null; then
            BASE="orgs/${OWNER}"
          else
            BASE="users/${OWNER}"
          fi
          # GitHub Maven package API name is usually groupId.artifactId or groupId%3AartifactId
          deleted=
          for PKG in "com.mshrai.larer" "com.mshrai%3Alarer" "larer"; do
            VID=$(gh api "${BASE}/packages/maven/${PKG}/versions" -q '.[] | select(.name=="latest") | .id' 2>/dev/null | head -1)
            if [ -n "$VID" ]; then
              echo "Deleting ${PKG} version latest (id=$VID)"
              gh api --method DELETE "${BASE}/packages/maven/${PKG}/versions/${VID}"
              deleted=1
              break
            fi
          done
          if [ -z "$deleted" ]; then
            echo "No existing 'latest' Maven version found to delete (first publish or different package name)"
          fi

      - name: Deploy moving tag 'latest'
        run: >-
          mvn --batch-mode -ntp deploy
          -Dgithub.repository=${{ github.repository }}
          -Drevision=latest
